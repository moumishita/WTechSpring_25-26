<!DOCTYPE html>
<html lang ="eng"> 
<title> Student Registration Page </title>
<head>
    <h1> Student Registration Page </h1>
</head>

<form>

    <label for = "StudentName"> Student Name: </label>
    <input type="text" id ="StudentName" name ="StudentName" placeholder="Enter Your Name">
    <br></br>

    <label for = "StudentCGPA"> Student CGPA: </label>
    <input type="text" id ="StudentCGPA" name ="StudentCGPA" placeholder="Enter Your CGPA">
    <br></br>
    
    <label for= "GenderMale" >Male</label>
    <input type="radio" id = "GenderMale" name ="GenderMale" value = "Male">
    <br><br>

    <label for= "GenderFemale" >Female</label>
    <input type="radio" id = "GenderFemale" name ="GenderFemale" value = "Female">
    <br><br>

    <label for="Deparment">Select Deparment: </label>
    <select>
        <option values ="Default">CSE</option>
        <option values ="BBA">BBA</option>
        <option values ="EEE">EEE</option>
        <option values ="Archi">Archi</option>
    </select>
    <br><br>

    <label for="StudentID">Student ID</label>
    <input type="text" id="StudentID" name="StudentID">
    <br><br>

    <label for="Address">Address:</label>
    <textarea id="Address" name="Address" rows="4" cols="30" placeholder="Enter your address here"></textarea>
    <br><br>

    <label for="DOB">Date of Birth:</label>
    <input type="date" id="DOB" name="DOB">
    <br><br>

    <label for = "Email"> Email: </label>
    <input type="text" id ="Email" name ="Email" placeholder="Enter your email">
    <br></br>

    <label for="GradeFile">Upload your Grade Report:</label>
    <input type="file" id="GradeFile" name="GradeFile">
    <br><br>

    <label for = "Agree"> I agree to the trems and condition </label>
    <input type="checkbox">
    <br><br>

    <label for = "Phoneno"> Phone Number: </label>
    <input type="text" id ="Phoneno" name ="Phoneno" placeholder="Enter your phone number">
    <br></br>

    <label for = "Submit"> Submit you information </label>
    <br><br>

    <input type="submit" name="Submit" id="Submit">
    <br><br>
</form>


</html>
